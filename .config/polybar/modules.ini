ramp-signal-2 = Ō¢ā
ramp-signal-3 = Ō¢ä
ramp-signal-4 = Ō¢ģ
ramp-signal-5 = Ō¢å
ramp-signal-6 = Ō¢ć
ramp-signal-7 = Ō¢ł
ramp-signal-foreground = #7e52c6


