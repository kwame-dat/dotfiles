[module/date]
type = internal/date
interval = 1.0
date = " %a %b %d, %Y"
date-alt = " %a %b %d, %Y"
time = %l:%M%p
time-alt = %l:%M%p
format-prefix = " ´ü│"
format-background = ${colors.background}
format-foreground = ${colors.foreground}
label = "%date% %time% "
format-underline = ${colors.alert}

[module/cpu]
type = internal/cpu
interval = 1
format-prefix-foreground = ${colors.foreground-alt}
format-underline = ${colors.alert}
format-prefix = " ´ïø "

label-font = 1

; Available tags:
;   <label> (default)
;   <bar-load>
;   <ramp-load>
;   <ramp-coreload>
format = <label>


; Available tokens:
;   %percentage% (default) - total cpu load
;   %percentage-cores% - load percentage for each core
;   %percentage-core[1-9]% - load percentage for specific core
label = "Cpu %percentage:3%%"

[module/memory]
type = internal/memory
interval = 1
; Available tokens:
;   %percentage_used% 
;   %percentage_free%
;   %gb_used% (default)
;   %gb_free%
;   %gb_total%
;   %mb_used%
;   %mb_free%
;   %mb_total%
label = %gb_used%

format = "Mem <label>  "
format-prefix = "  ´ê│ "
format-prefix-foreground = ${colors.foreground-alt}
format-underline = ${colors.primary}

[module/networkspeedup]
type = internal/network
;interface = wlp3s0
;interface = enp14s0
;interface = enp0s31f6
interface = enp1s0
label-connected = "%upspeed:7%"
format-connected = <label-connected>
format-connected-prefix = "´üó"
format-connected-prefix-foreground = ${colors.foreground-alt}
format-connected-foreground = ${colors.foreground}
format-connected-background = ${colors.background}
format-connected-underline = ${colors.primary}

[module/networkspeeddown]
type = internal/network
; interface = wlp3s0
; interface = enp14s0
; interface = enp0s31f6
interface = enp1s0
label-connected = "%downspeed:7%"
format-connected = <label-connected>
format-connected-prefix = "´üú"
format-connected-prefix-foreground = ${colors.foreground-alt}
format-connected-foreground = ${colors.foreground}
format-connected-background = ${colors.background}
format-connected-underline = ${colors.alert}

[module/spotify]
type = custom/script
exec = python ~/.config/polybar/scripts/spotify.py  -f '{song} - {artist} - {album}'
interval = 1

;format = <label>
format-foreground = ${colors.foreground}
format-background = ${colors.background}

format-padding = 0
format-underline = ${colors.success}
format-prefix = "´å╝  "
format-prefix-foreground = ${colors.foreground-alt}
label = %output:0:150%

[module/pub-ip]
type = custom/script
exec = ~/.config/polybar/scripts/pub-ip.sh
interval = 100
format-foreground = ${colors.foreground}
format-background = ${colors.background}
label = %output%
format-prefix = " ´â¿ "
format-prefix-foreground = ${colors.foreground}

[module/uptime]
type = custom/script
exec = uptime | awk -F, '{sub(".*up ",x,$1);print $1}'
interval = 100
label = Uptime : %output%

format-foreground = ${colors.foreground}
format-background = ${colors.background}
format-prefix = "´äê "
format-prefix-foreground = ${colors.foreground}


[module/wireless-network]
;https://github.com/jaagr/polybar/wiki/Module:-network
type = internal/network
interface = ${env:WIRELESS}
interval = 3.0
label-connected = %essid%

format-connected = <label-connected>
;format-connected = <ramp-signal> <label-connected>
format-connected-foreground = ${colors.foreground}
format-connected-background = ${colors.background}
format-connected-prefix = " ´ç½ "
format-connected-prefix-foreground = #7e52c6
format-connected-prefix-background = ${colors.background}
format-connected-underline = #7e52c6

label-disconnected = %ifname% disconnected
label-disconnected-foreground = ${colors.alert}
label-disconnected-background = ${colors.background}

format-disconnected = <label-disconnected>
format-disconnected-foreground = ${colors.alert}
format-disconnected-background = ${colors.background}
format-disconnected-prefix = " ´ç½ "
format-disconnected-prefix-foreground = ${colors.alert}
format-disconnected-prefix-background = ${colors.background}
format-disconnected-underline =${colors.alert}

ramp-signal-0 = Ôûü
ramp-signal-1 = Ôûé
ramp-signal-2 = Ôûâ
ramp-signal-3 = Ôûä
ramp-signal-4 = Ôûà
ramp-signal-5 = Ôûå
ramp-signal-6 = Ôûç
ramp-signal-7 = Ôûê
ramp-signal-foreground = #7e52c6


[module/bspwm]
type = internal/bspwm
pin-workspaces = false
inline-mode = false
enable-click = true
enable-scroll = false
reverse-scroll = false
fuzzy-match = true

ws-icon-[0-9]+ = <label>;<icon>
; Note that the <label> needs to correspond with the bspwm workspace name
; Neither <label> nor <icon> can contain a semicolon (;)
ws-icon-0 = 1;´äí 
ws-icon-1 = 2;´é¼
ws-icon-2 = 3;´çÇ
ws-icon-3 = 4;´âá
ws-icon-4 = 5;´ë¼
ws-icon-5 = 6;´ë¼
ws-icon-6 = 7;´Ç¢
ws-icon-7 = 8;´éå
ws-icon-8 = 9;´åÿ
ws-icon-9 = 0;´å╝
ws-icon-default ="´ë¼"

; Available tags:
;   <label-monitor>
;   <label-state> - gets replaced with <label-(focused|urgent|occupied|empty)>
;   <label-mode> - gets replaced with <label-(monocle|tiled|fullscreen|floating|locked|sticky|private)>
; Default: <label-state>
format = <label-state> <label-mode>

label-monitor = %name%

label-dimmed-foreground = ${colors.foreground}
label-dimmed-focused-background = ${colors.background-alt}

label-focused = %icon%
label-focused-background = ${colors.background-alt}
label-focused-underline= ${colors.primary}
label-focused-padding = 2


label-occupied = %icon%
label-occupied-background = ${colors.background}
label-occupied-foreground= ${colors.foreground}
label-occupied-padding = 2
label-occupied-underline= ${colors.alert}


label-urgent = %icon%
label-urgent-foreground = ${colors.foreground}
label-urgent-background = ${colors.background}

label-empty = %icon%
label-empty-foreground = ${colors.foreground}
label-empty-background = ${colors.background}
label-empty-padding = 2

[module/ewmh]
type = internal/xworkspaces

pin-workspaces = false
enable-click = true
enable-scroll = true
reverse-scroll = true


icon-0 = 1;
icon-1 = 2;
icon-2 = 3;
icon-3 = 4;
icon-4 = 5;
#icon-5 = 6;
format = <label-state>
label-monitor = %name%

label-active = %name%
label-active-foreground = ${colors.foreground}
label-active-background = ${colors.background}
label-active-underline= #6790eb
label-active-padding = 2

label-occupied = %name%
label-occupied-background = ${colors.background}
label-occupied-padding = 2

label-urgent = %name%
label-urgent-foreground = ${colors.foreground}
label-urgent-background = ${colors.alert}
label-urgent-underline = ${colors.alert}
label-urgent-padding = 2


label-empty = %name%
label-empty-foreground = ${colors.foreground}
label-empty-padding = 2
format-foreground = ${colors.foreground}
format-background = ${colors.background}